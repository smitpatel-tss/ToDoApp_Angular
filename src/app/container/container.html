<div class="parent-container">
    <h1>ToDo App</h1>
    <div class="container">
        
        <div class="part">
        <input-container (taskGenerated)="addTask($event)" [pendingTasks]="getDesiredTasks(false)"></input-container>
        </div>
        <div class="part">
        <output-container [completedTasks]="getDesiredTasks(true)"></output-container>
            </div>
    </div>
</div>
